name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: build/libs/movie-flow-0.0.1.jar
          retention-days: 5

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK not configured"
            echo "Setup instructions:"
            echo "1. Get Deploy Hook from: Render Dashboard → Web Service → Settings → Deploy Hooks"
            echo "2. Add as GitHub Secret: RENDER_DEPLOY_HOOK"
            exit 0
          fi
          
          echo "🚀 Triggering Render deployment..."
          curl --no-progress-meter -X POST "$RENDER_DEPLOY_HOOK"
          echo -e "\n✅ Deployment request sent to Render"

      - name: Deployment Summary
        if: always()
        run: |
          echo "📊 Deployment Summary"
          echo "===================="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Status: ${{ job.status }}"