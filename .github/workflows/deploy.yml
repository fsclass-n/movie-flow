name: Deploy movie-flow to AWS EC2

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: movieflow:latest
  REMOTE_IMAGE_PATH: /tmp/movieflow-image.tar
  REMOTE_CONTAINER_NAME: movieflow
  REMOTE_PORT: 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot application
        # plain jar 생성을 방지하고 빌드합니다.
        run: ./gradlew clean build -x test

      - name: Prepare Jar file
        # 중요: build/libs 폴더 안의 snapshot jar 하나만 app.jar라는 이름으로 루트에 복사합니다.
        # target 위치에 /를 붙이지 않아 파일로 생성되게 합니다.
        run: find build/libs/ -name "*-SNAPSHOT.jar" -exec cp {} app.jar \;

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --tag ${{ env.IMAGE_NAME }} .

      - name: Export Docker image to tar
        run: |
          docker save ${{ env.IMAGE_NAME }} -o movieflow-image.tar

      - name: Copy image to EC2 host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          source: "movieflow-image.tar"
          target: "/tmp"
          timeout: 60s

      - name: Deploy Docker container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            sudo docker stop ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rm ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rmi ${{ env.IMAGE_NAME }} 2>/dev/null || true
            
            sudo docker load -i ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker run -d \
              --name ${{ env.REMOTE_CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.REMOTE_PORT }}:${{ env.REMOTE_PORT }} \
              ${{ env.IMAGE_NAME }}
            
            sudo rm -f ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker image prune -f