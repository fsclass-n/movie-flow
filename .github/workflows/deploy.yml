name: Deploy movie-flow to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: movieflow:latest
  REMOTE_IMAGE_PATH: /tmp/movieflow-image.tar
  REMOTE_CONTAINER_NAME: movieflow
  REMOTE_PORT: 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot application
        run: ./gradlew clean build -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --tag $IMAGE_NAME .

      - name: Export Docker image to tar
        run: |
          docker save $IMAGE_NAME -o movieflow-image.tar

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          cat <<'EOF' > ec2_deploy_key.pem
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 ec2_deploy_key.pem

      - name: Copy image to EC2 host
        run: |
          PORT="${{ secrets.EC2_SSH_PORT }}"
          if [ -z "$PORT" ]; then
            PORT=22
          fi
          scp -i ec2_deploy_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P "$PORT" movieflow-image.tar "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$REMOTE_IMAGE_PATH"

      - name: Deploy Docker container on EC2
        run: |
          PORT="${{ secrets.EC2_SSH_PORT }}"
          if [ -z "$PORT" ]; then
            PORT=22
          fi
          ssh -i ec2_deploy_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
            sudo docker load -i $REMOTE_IMAGE_PATH
            sudo docker stop $REMOTE_CONTAINER_NAME || true
            sudo docker rm $REMOTE_CONTAINER_NAME || true
            sudo docker run -d --name $REMOTE_CONTAINER_NAME --restart unless-stopped -p $REMOTE_PORT:$REMOTE_PORT $IMAGE_NAME
            sudo rm -f $REMOTE_IMAGE_PATH
          EOF

      - name: Deployment Summary
        if: always()
        run: |
          echo "📊 Deployment Summary"
          echo "===================="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Status: ${{ job.status }}"
