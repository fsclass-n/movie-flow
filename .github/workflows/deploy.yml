name: Deploy movie-flow to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 수동 실행 버튼 활성화

env:
  IMAGE_NAME: movieflow:latest
  REMOTE_CONTAINER_NAME: movie-flow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Docker Hub 로그인 (이미지 저장소 사용)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. 이미지 빌드 및 푸시
      # 멀티 스테이지 빌드이므로 여기서 바로 jar까지 생성됩니다.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest

      # 3. EC2 접속 및 배포
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }} # 혹은 ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            # 기존 컨테이너 정리
            sudo docker stop ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rm ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker image rm ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest 2>/dev/null || true
            
            # 새 이미지 Pull 및 실행 (80포트로 접속하면 내부 8080으로 연결)
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest
            sudo docker run -d \
              --name ${{ env.REMOTE_CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 80:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest
            
            # 안 쓰는 이미지 정리
            sudo docker image prune -f