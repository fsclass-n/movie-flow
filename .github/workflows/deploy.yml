name: Deploy movie-flow to Render

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify build with Gradle
        run: ./gradlew clean build -x test --no-daemon

      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ Warning: RENDER_DEPLOY_HOOK secret is not set. Skipping deploy hook trigger."
            echo "Since your Render service is linked to GitHub, it will deploy automatically on push."
            exit 0
          fi
          echo "🚀 Triggering Render deployment..."
          curl -f -X POST "$RENDER_DEPLOY_HOOK"
          echo -e "\n✅ Deployment request successfully sent to Render!"