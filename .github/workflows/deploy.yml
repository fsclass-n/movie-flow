name: Deploy movie-flow to AWS EC2

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: movieflow:latest
  REMOTE_IMAGE_PATH: /tmp/movieflow-image.tar
  REMOTE_CONTAINER_NAME: movieflow
  REMOTE_PORT: 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot application
        # 빌드 시 plain jar 생성을 방지하고 빌드 결과물만 남깁니다.
        run: ./gradlew clean build -x test

      - name: Prepare Jar file for Docker
        # 핵심 로직: build/libs 폴더 내부를 뒤져서 jar 파일을 루트의 app.jar로 복사합니다.
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" ! -name "*plain.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "Error: 빌드된 JAR 파일을 찾을 수 없습니다."
            ls -R build/
            exit 1
          fi
          cp "$JAR_PATH" ./app.jar
          echo "복사 완료: $JAR_PATH -> ./app.jar"
          ls -l ./app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        # 현재 위치(.)에서 빌드하므로 바로 옆에 생성된 app.jar를 도커가 인식합니다.
        run: |
          docker build --tag ${{ env.IMAGE_NAME }} .

      - name: Export Docker image to tar
        run: |
          docker save ${{ env.IMAGE_NAME }} -o movieflow-image.tar

      - name: Copy image to EC2 host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          source: "movieflow-image.tar"
          target: "/tmp"
          timeout: 120s

      - name: Deploy Docker container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            sudo docker stop ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rm ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rmi ${{ env.IMAGE_NAME }} 2>/dev/null || true
            
            sudo docker load -i ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker run -d \
              --name ${{ env.REMOTE_CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.REMOTE_PORT }}:${{ env.REMOTE_PORT }} \
              ${{ env.IMAGE_NAME }}
            
            sudo rm -f ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker image prune -f