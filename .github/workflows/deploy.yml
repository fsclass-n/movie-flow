name: Deploy movie-flow to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: movieflow:latest
  REMOTE_IMAGE_PATH: /tmp/movieflow-image.tar
  REMOTE_CONTAINER_NAME: movieflow
  REMOTE_PORT: 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot application
        run: ./gradlew clean build -x test --no-daemon

      # 핵심 추가: 빌드된 jar 파일을 Dockerfile이 있는 곳으로 복사 (중요!)
      - name: Prepare Jar file for Docker
        run: cp build/libs/*.jar ./app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --tag ${{ env.IMAGE_NAME }} .

      - name: Export Docker image to tar
        run: |
          docker save ${{ env.IMAGE_NAME }} -o movieflow-image.tar
          sudo chmod 644 movieflow-image.tar

      - name: Copy image to EC2 host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          source: "movieflow-image.tar"
          target: "/tmp"
          timeout: 60s
          command_timeout: 15m

      - name: Deploy Docker container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            sudo docker stop ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rm ${{ env.REMOTE_CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rmi ${{ env.IMAGE_NAME }} 2>/dev/null || true
            
            sudo docker load -i ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker run -d \
              --name ${{ env.REMOTE_CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.REMOTE_PORT }}:${{ env.REMOTE_PORT }} \
              ${{ env.IMAGE_NAME }}
            
            sudo rm -f ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker image prune -f