name: Deploy movie-flow to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: movieflow:latest
  REMOTE_IMAGE_PATH: /tmp/movieflow-image.tar
  REMOTE_CONTAINER_NAME: movieflow
  REMOTE_PORT: 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot application
        run: ./gradlew clean build -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --tag ${{ env.IMAGE_NAME }} .

      - name: Export Docker image to tar
        run: |
          docker save ${{ env.IMAGE_NAME }} -o movieflow-image.tar
          # 핵심 수정 사항: 파일 권한을 644로 변경하여 SCP 액션이 읽을 수 있게 함
          sudo chmod 644 movieflow-image.tar

      - name: Copy image to EC2 host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          source: "movieflow-image.tar"
          target: "/tmp"
          timeout: 60s      # 대용량 파일 전송을 위해 타임아웃 연장
          command_timeout: 15m

      - name: Deploy Docker container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            # 1. 기존 컨테이너 및 이미지 정리
            sudo docker stop ${{ env.REMOTE_CONTAINER_NAME }} || true
            sudo docker rm ${{ env.REMOTE_CONTAINER_NAME }} || true
            sudo docker rmi ${{ env.IMAGE_NAME }} || true
            
            # 2. 새 이미지 로드 및 실행
            sudo docker load -i ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker run -d \
              --name ${{ env.REMOTE_CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.REMOTE_PORT }}:${{ env.REMOTE_PORT }} \
              ${{ env.IMAGE_NAME }}
            
            # 3. 정리 작업
            sudo rm -f ${{ env.REMOTE_IMAGE_PATH }}
            sudo docker image prune -f

      - name: Deployment Summary
        if: always()
        run: |
          echo "📊 Deployment Summary"
          echo "===================="
          echo "Branch: ${{ github.ref_name }}"
          echo "Status: ${{ job.status }}"