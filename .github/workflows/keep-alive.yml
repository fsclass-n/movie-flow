name: Keep Alive

on:
  schedule:
    # Runs every 12 minutes (Render free tier goes to sleep after 15 minutes of inactivity)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive ping to MovieFlow
        env:
          WAKE_UP_URL: ${{ secrets.WAKE_UP_URL }}
        run: |
          if [ -z "$WAKE_UP_URL" ]; then
            echo "⚠️ Warning: WAKE_UP_URL secret is not set. Skipping keep-alive ping."
            echo "Please configure WAKE_UP_URL in your GitHub repository secrets."
            exit 0
          fi
          curl -sL -I "$WAKE_UP_URL"
