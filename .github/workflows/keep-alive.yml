name: Keep Alive

on:
  schedule:
    # Runs every 12 minutes (Render free tier goes to sleep after 15 minutes of inactivity)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive ping to MovieFlow
        run: |
          curl -sL -I https://movieflowkr.onrender.com/
