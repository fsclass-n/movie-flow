name: 4시간 주기 데이터 전송 자동화

on:
  schedule:
    # 4시간마다 실행 (00:00, 04:00, 08:00 ...)
    - cron: '0 */4 * * *'
  # GitHub 상단 Actions 탭에서 직접 실행 버튼을 누를 수 있게 함
  workflow_dispatch: 

env:
  # Node 버전 경고 무시 및 실행 보장
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 현재 디렉토리 확인 (디버깅용)
        run: ls -al

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # 루트에 있는 requirements.txt를 설치
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt를 찾지 못했습니다. 필수 패키지 직접 설치 시작."
            pip install requests selenium webdriver-manager python-dotenv
          fi

      - name: 크롤링 및 서버 전송 실행
        # theater_crawler.py가 실제 있는 경로로 지정하세요.
        # 프로젝트 구조에 따라 movie_flow/rpa/scripts/theater_crawler.py 등으로 수정 필요
        run: python movie_flow/rpa/scripts/theater_crawler.py

      - name: 실행 결과 확인
        if: always()
        run: echo "데이터 자동화 프로세스가 완료되었습니다."