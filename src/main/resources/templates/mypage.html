<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div th:replace="~{fragments/header :: common-header}"></div>

<main class="container my-5">
    <h2 class="fw-bold mb-4">내 알림 관리</h2>
    <div class="card-custom overflow-hidden">
        <table class="table table-dark table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th class="bg-dark text-secondary">신청 영화</th>
                    <th class="bg-dark text-secondary">상영 정보</th>
                    <th class="bg-dark text-secondary">상태</th>
                    <th class="bg-dark text-secondary">관리</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="alert : ${alerts}">
                    <td th:text="${alert.movieTitle}">인사이드 아웃 2</td>
                    <td th:text="${alert.theaterName + ' | ' + alert.startTime}">정보</td>
                    <td>
                        <span class="badge" 
                              th:classappend="${alert.status == 'WATCHING' ? 'bg-success' : 'bg-secondary'}"
                              th:text="${alert.status == 'WATCHING' ? '감시 중' : '전송 완료'}"></span>
                    </td>
                    <td>
                        <form th:action="@{/alert/cancel}" method="post">
                            <input type="hidden" name="alertId" th:value="${alert.id}">
                            <button type="submit" class="btn btn-outline-danger btn-sm">취소</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/footer :: common-footer}"></div>
</body>
</html>
