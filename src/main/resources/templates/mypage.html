<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
            <i class="fa-solid fa-film text-danger me-2"></i>MOVIE FLOW
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-4">
                    <span class="small text-secondary"><span class="rpa-status-dot"></span>RPA Engine Active</span>
                </li>
                <li class="nav-item me-3">
                    <a class="nav-link nav-link-custom" href="admin.html">
                        <i class="fa-solid fa-user-gear me-1"></i>관리자
                    </a>
                </li>
                <li class="nav-item">
                    <a href="mypage.html" class="btn btn-outline-light btn-sm px-3">마이페이지</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-5">
    <h2 class="fw-bold mb-4">내 알림 관리</h2>
    <div class="card-custom overflow-hidden">
        <table class="table table-dark table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th class="bg-dark text-secondary">신청 영화</th>
                    <th class="bg-dark text-secondary">상영 정보</th>
                    <th class="bg-dark text-secondary">상태</th>
                    <th class="bg-dark text-secondary">관리</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="alert : ${alerts}">
                    <td th:text="${alert.movieTitle}">인사이드 아웃 2</td>
                    <td th:text="${alert.theaterName + ' | ' + alert.startTime}">정보</td>
                    <td>
                        <span class="badge" 
                              th:classappend="${alert.status == 'WATCHING' ? 'bg-success' : 'bg-secondary'}"
                              th:text="${alert.status == 'WATCHING' ? '감시 중' : '전송 완료'}"></span>
                    </td>
                    <td>
                        <form th:action="@{/alert/cancel}" method="post">
                            <input type="hidden" name="alertId" th:value="${alert.id}">
                            <button type="submit" class="btn btn-outline-danger btn-sm">취소</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer>
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                <h5 class="fw-bold text-white mb-2">MOVIE FLOW</h5>
                <p class="small mb-0">RPA 중심의 영화 예매 자동화 및 효율화 세미 프로젝트</p>
                <p class="small text-secondary">Created by Team Java Fullstack (4인)</p>
            </div>
            <div class="col-md-6 text-center text-md-end">
                <div class="mb-2">
                    <a href="#" class="text-secondary me-3"><i class="fa-brands fa-github h5"></i></a>
                    <a href="#" class="text-secondary"><i class="fa-solid fa-envelope h5"></i></a>
                </div>
                <p class="small mb-0">&copy; 2026 Movie Flow RPA Project. All rights reserved.</p>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
