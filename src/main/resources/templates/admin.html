<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - MOVIE FLOW</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* 로그 레벨별 색상 정의 */
        .log-INFO { color: #00ff00; }  /* 초록 */
        .log-WARN { color: #ffcc00; }  /* 노랑 */
        .log-ERROR { color: #ff4444; } /* 빨강 */
    </style>
</head>
<body>
    
    <div th:replace="~{fragments/header :: common-header}"></div>

    <main class="container my-5">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card-custom p-4 text-center">
                    <h6 class="text-secondary">활성 봇 수</h6>
                    <div class="display-5 fw-bold text-primary" th:text="${activeBots}">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom p-4 text-center">
                    <h6 class="text-secondary">알림 전송 수</h6>
                    <div class="display-5 fw-bold text-success" th:text="${sentCount}">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom p-4 text-center">
                    <h6 class="text-secondary">시스템 상태</h6>
                    <div class="display-5 fw-bold text-info">Active</div>
                </div>
            </div>
        </div>

        <div class="card-custom p-4">
            <h5 class="fw-bold mb-3">
                <i class="fa-solid fa-terminal me-2"></i>RPA Execution Log
                <small class="text-secondary ms-2" style="font-size: 0.7em;">(최신 10개 내역)</small>
            </h5>
            
            <div class="bg-black p-3 rounded font-monospace small" style="height: 400px; overflow-y: auto;">
                <div th:each="log : ${logs}" class="mb-1">
                    <span th:if="${log instanceof T(java.lang.String)}" th:text="${log}"></span>
                    
                    <th:block th:if="${log instanceof T(java.util.Map)}">
                        <span th:class="'log-' + ${log.log_level}" th:text="'[' + ${log.log_level} + ']'"></span>
                        <span class="text-white-50" th:text="${#calendars.format(#calendars.createNow(), 'HH:mm:ss')}"></span>
                        <span class="ms-2 text-light" th:text="${log.message}"></span>
                    </th:block>
                </div>
                
                <div th:if="${#lists.isEmpty(logs)}" class="text-secondary text-center mt-5">
                    표시할 로그 데이터가 없습니다.
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: common-footer}"></div>

</body>
</html>
