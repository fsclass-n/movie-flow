<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Detail - Movie Flow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

    <div th:replace="~{fragments/header :: common-header}"></div>

    <main class="container my-5">
        <div class="row">
            <div class="col-lg-8">
                <div class="card-custom p-4 mb-4">
                    <h2 class="fw-bold mb-4">
                        <span th:text="${movie.title}">영화 제목</span>
                        <small class="text-secondary h6" th:text="${movie.theaterName}">상영관</small>
                    </h2>
                    <h5 class="mb-3"><i class="fa-solid fa-clock me-2"></i>상영 시간 정보</h5>
                    <div class="d-flex gap-2 flex-wrap mb-4">
                        <button class="btn btn-outline-light active" 
                                th:text="${movie.startTime} + ' (' + ${movie.goodSeats} + '석)'"></button>
                    </div>
                    <div class="bg-dark p-5 rounded-3 text-center mb-4">
                        <div class="text-secondary mb-3">SCREEN</div>
                        <div class="d-flex justify-content-center gap-1 mb-1" th:each="i : ${#numbers.sequence(1, 5)}">
                            <span class="bg-secondary d-inline-block rounded-1" style="width:20px; height:20px;"></span>
                            <span class="bg-danger d-inline-block rounded-1" style="width:20px; height:20px;"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <form th:action="@{/alert/setup}" method="post" class="card-custom p-4 sticky-top" style="top: 100px;">
                    <input type="hidden" name="movieId" th:value="${movie.id}">
                    <h4 class="fw-bold mb-3">RPA 알림 신청</h4>
                    <div class="mb-3">
                        <label class="form-label small">수신 이메일</label>
                        <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">알림 조건</label>
                        <select name="condition" class="form-select bg-dark text-white border-secondary">
                            <option value="1">명당 구역 1석 이상</option>
                            <option value="all">중앙 블록 전체</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-3">RPA 감시 시작</button>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: common-footer}"></div>

</body>
</html>
