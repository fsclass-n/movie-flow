services:
  - type: web
    name: movie-flow
    plan: free  # 또는 starter, standard 등으로 변경 가능
    runtime: docker
    region: oregon  # 또는 singapore, frankfurt 등으로 변경 가능
    dockerfile: ./Dockerfile
    dockerContext: .
    
    # 환경 변수 설정
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      
      # TiDB Database Connection Settings (Render 대시보드에서 직접 입력하거나 환경 변수 주입)
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: com.mysql.cj.jdbc.Driver

      # Mail Server Settings
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false

    # 빌드 명령
    buildCommand: chmod +x gradlew && ./gradlew clean build -x test --no-daemon
    
    # 헬스 체크 (Render에서 서비스 상태 확인 경로)
    healthCheckPath: /
    healthCheckInterval: 30
    healthCheckStartupFailureThresholdCount: 3
    
    # 포트
    ports:
      - port: 8080
        protocol: HTTP
    
    # GitHub Actions로만 빌드 성공 시 배포를 제어하기 위해 autoDeploy는 false로 설정
    autoDeploy: false
